set -s extended-keys on
set -s extended-keys-format csi-u
set-option -sa terminal-overrides ",xterm*:Tc"
# set -as terminal-features 'xterm-ghostty:extkeys'
set -g @tpm-clean 'u'

unbind r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

bind -n 'C-k' send-keys "clear" Enter \; clear-history

# Vim style movement
set-window-option -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Logitech Keyboard Issues
bind-key -n M-@ send-keys "@"
bind-key -n 'M-\' send-keys '\'
bind-key -n 'M-|' send-keys '|'

# renumber windows
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g escape-time 0             # zero-out escape time delay
set -g history-limit 100000     # increase history size (from 2,000)
set -g mouse on
set -g prefix ^A
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard
set -g status-position top       # macOS / darwin style

set -g pane-border-lines single

set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_status_background "#22212C"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_current_text "#W"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'catppuccin/tmux'
# set -g @plugin 'tmux-plugins/tmux-battery'

set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_date_time}"
set -g @yank_with_mouse off

run '~/.tmux/plugins/tpm/tpm'
# Copy on mouse release but stay in copy mode (must be after TPM loads plugins)
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "pbcopy"
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel


# Notifications
bind I display-message "Installing plugins..." \; run-shell '~/.tmux/plugins/tpm/bin/install_plugins'
bind u display-message "Cleaning plugins..." \; run-shell '~/.tmux/plugins/tpm/bin/clean_plugins'
bind U display-message "Updating plugins..." \; run-shell '~/.tmux/plugins/tpm/bin/update_plugins all'
